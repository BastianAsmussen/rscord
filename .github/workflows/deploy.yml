name: deploy

on:
  workflow_run:
    workflows: [test-backend]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_DIR: ${{ secrets.HETZNER_DEPLOY_DIR }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          OPAQUE_SERVER_SETUP: ${{ secrets.OPAQUE_SERVER_SETUP }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASEAPIKEY }}
          SSL_KEY: ${{ secrets.SSL_KEY }}
          SSL_CERT: ${{ secrets.SSL_CERT }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DEPLOY_DIR,DB_PASSWORD,OPAQUE_SERVER_SETUP,FIREBASE_API_KEY,SSL_KEY,SSL_CERT
          script: |
            set -e

            REPO_DIR="${DEPLOY_DIR:-$HOME/rscord}"
            if [ ! -d "$REPO_DIR" ]; then
              git clone https://github.com/${{ github.repository }} "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git pull --ff-only origin master

            cd src-backend

            mkdir -p db
            printf '%s' "${DB_PASSWORD}" > db/password.txt
            chmod 644 db/password.txt

            printf 'DATABASE_URL=postgres://postgres:%s@db:5432/rscord\n' "${DB_PASSWORD}" > .env
            printf 'OPAQUE_SERVER_SETUP=%s\n' "${OPAQUE_SERVER_SETUP}" >> .env
            chmod 644 .env

            echo $FIREBASE_API_KEY > fcm-service-account.json
            chmod 644 fcm-service-account.json

            mkdir -p nginx/ssl
            printf '%s' "${SSL_KEY}" > nginx/ssl/nginx.key
            chmod 600 nginx/ssl/nginx.key

            printf '%s' "${SSL_CERT}" > nginx/ssl/nginx.crt
            chmod 644 nginx/ssl/nginx.crt

            docker compose up --build -d
