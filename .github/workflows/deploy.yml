name: deploy

on:
  workflow_run:
    workflows: [test-backend]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_DIR: ${{ secrets.HETZNER_DEPLOY_DIR }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DEPLOY_DIR,DB_PASSWORD
          script: |
            set -e

            REPO_DIR="${DEPLOY_DIR:-$HOME/rscord}"
            if [ ! -d "$REPO_DIR" ]; then
              git clone https://github.com/${{ github.repository }} "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git pull --ff-only origin master

            cd src-backend

            mkdir -p db
            printf '%s' "${DB_PASSWORD}" > db/password.txt
            chmod 600 db/password.txt

            printf 'DATABASE_URL=postgres://postgres:%s@db:5432/rscord\n' "${DB_PASSWORD}" > .env
            chmod 600 .env

            docker compose up --build -d
