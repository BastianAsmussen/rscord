services:
  server:
    build:
      context: .
      target: final
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      backend:
        ipv4_address: 1.0.0.3

  db:
    image: postgres:18.1-trixie
    restart: always
    user: postgres
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=rscord
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    expose:
      - 5432
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      backend:
        ipv4_address: 1.0.0.2

volumes:
  db-data:

secrets:
  db-password:
    file: db/password.txt

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 1.0.0.0/29
          gateway: 1.0.0.1
