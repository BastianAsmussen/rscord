# Spin up a PostgreSQL instance for running `cargo test` locally.
#
#   docker compose -f compose.test.yaml up -d
#   cargo test
#   docker compose -f compose.test.yaml down
#
# The credentials here match the defaults in tests/api_endpoints.rs
# (overridable via the TEST_DATABASE_URL env var).
services:
  test-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rscord_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: rscord_test
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rscord_test"]
      interval: 10s
      timeout: 5s
      retries: 5
